<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA Soft - Gestión</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, text-area { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CDA Soft - Módulo de Servicios</h1>
        
        <!-- Formulario para Crear Servicio -->
        <h2>Registrar Nuevo Servicio</h2>
        <form id="form-servicio">
            <div class="form-group">
                <label for="nombre">Nombre del Servicio:</label>
                <input type="text" id="nombre" required placeholder="Ej. Revisión Técnico-Mecánica">
            </div>
            <div class="form-group">
                <label for="precio">Precio ($):</label>
                <input type="number" id="precio" required placeholder="Ej. 210000">
            </div>
            <div class="form-group">
                <label for="descripcion">Descripción:</label>
                <input type="text" id="descripcion" placeholder="Detalles del servicio...">
            </div>
            <button type="submit">Guardar Servicio</button>
        </form>

        <!-- Tabla de Visualización (Consumo del GET) -->
        <h2>Servicios Registrados</h2>
        <table id="tabla-servicios">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Descripción</th>
                </tr>
            </thead>
            <tbody id="lista-servicios">
                <!-- Los datos de la API se inyectarán aquí dinámicamente -->
            </tbody>
        </table>
    </div>

    <!-- Scripts en orden -->
    <script type="module" src="js/ApiService.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
